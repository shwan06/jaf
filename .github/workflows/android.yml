name: Build Android APK

# Builds an installable debug APK that wraps the live PWA in a WebView.
# Run it from the Actions tab (Run workflow) or by pushing changes under android/.
# Download the APK from the run's "Artifacts" section, then install it on your
# phone (enable "Install unknown apps" for your browser/file manager first).

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: russian-az-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
