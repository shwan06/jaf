name: Deploy to GitHub Pages

# Publishes the static site in `static/` to GitHub Pages.
# One-time setup: in the repo, go to Settings → Pages → Build and deployment
# → Source: "GitHub Actions". After that, every push to the branch below
# (or a manual run via the Actions tab) deploys automatically.

on:
  push:
    branches: ["claude/russian-grammar-app-efni4h"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
